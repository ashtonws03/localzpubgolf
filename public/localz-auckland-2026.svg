<svg width="900" height="900" viewBox="0 0 900 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="190" y1="110" x2="720" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6CF"/>
      <stop offset="0.2" stop-color="#F3DA8A"/>
      <stop offset="0.55" stop-color="#D5AE52"/>
      <stop offset="0.82" stop-color="#A97725"/>
      <stop offset="1" stop-color="#8B5C13"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="240" y1="200" x2="670" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8E0" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#D5AE52" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="900" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- outer halo -->
  <g opacity="0.9" filter="url(#glow)">
    <circle cx="450" cy="438" r="214" stroke="url(#gold)" stroke-opacity="0.22" stroke-width="7"/>
    <circle cx="450" cy="438" r="250" stroke="url(#goldSoft)" stroke-opacity="0.14" stroke-width="3"/>
  </g>

  <!-- left laurel -->
  <g fill="url(#gold)">
    <ellipse cx="242" cy="655" rx="26" ry="10" transform="rotate(-54 242 655)"/>
