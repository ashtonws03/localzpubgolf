    <ellipse cx="219" cy="624" rx="26" ry="10" transform="rotate(-49 219 624)"/>
    <ellipse cx="199" cy="589" rx="26" ry="10" transform="rotate(-44 199 589)"/>
    <ellipse cx="183" cy="551" rx="26" ry="10" transform="rotate(-37 183 551)"/>
    <ellipse cx="170" cy="512" rx="26" ry="10" transform="rotate(-30 170 512)"/>
    <ellipse cx="163" cy="470" rx="26" ry="10" transform="rotate(-18 163 470)"/>
